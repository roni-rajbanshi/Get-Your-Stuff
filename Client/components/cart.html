<!-- Cart Modal Component -->
<div class="modal" id="cartModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Shopping Cart</h2>
            <button class="close-btn" id="closeCart">&times;</button>
        </div>
        <div class="modal-body" id="cartItems">
            <!-- Cart items will be loaded here -->
        </div>
        <div class="modal-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn btn-primary" id="checkoutBtn">Proceed to Checkout</button>
        </div>
    </div>
</div>

<!-- Cart Item Template -->
<div class="cart-item" data-product-id="{{id}}">
    <img src="{{product.images[0] || 'https://via.placeholder.com/100'}}" alt="{{product.title}}">
    <div class="cart-item-details">
        <h4>{{product.title}}</h4>
        <p>${{product.price.toFixed(2)}}</p>
        <div class="cart-item-quantity">
            <button onclick="updateCartQuantity('{{product._id}}', parseInt('{{quantity}}') - 1)">-</button>
            <span>{{quantity}}</span>
            <button onclick="updateCartQuantity('{{product._id}}', parseInt('{{quantity}}') + 1)">+</button>
        </div>
    </div>
    <button class="remove-btn" onclick="removeFromCart('{{product._id}}')">
        <i class="fas fa-trash"></i>
    </button>
</div>
