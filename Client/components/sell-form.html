<!-- Sell Product Form Component -->
<section class="sell-section" id="sell">
    <div class="container">
        <h2>Sell Your Items</h2>
        <p>Turn your unused items into cash! List your products in minutes.</p>
        
        <div class="sell-form-container">
            <form id="sellForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="productTitle">Product Title *</label>
                        <input type="text" id="productTitle" required maxlength="200">
                    </div>
                    <div class="form-group">
                        <label for="productCategory">Category *</label>
                        <select id="productCategory" required>
                            <option value="">Select Category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Fashion">Fashion</option>
                            <option value="Home">Home</option>
                            <option value="Books">Books</option>
                            <option value="Sports">Sports</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="productPrice">Price ($) *</label>
                        <input type="number" id="productPrice" required min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="productOriginalPrice">Original Price (Optional)</label>
                        <input type="number" id="productOriginalPrice" min="0" step="0.01">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="productDescription">Description *</label>
                    <textarea id="productDescription" required maxlength="2000" rows="4"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="productStock">Stock Quantity *</label>
                    <input type="number" id="productStock" required min="1">
                </div>
                
                <div class="form-group">
                    <label for="productImages">Product Images (Max 5)</label>
                    <input type="file" id="productImages" accept="image/*" multiple>
                    <small>Supported formats: JPG, PNG, GIF, WEBP (Max 5MB each)</small>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">List Product</button>
            </form>
        </div>
    </div>
</section>
