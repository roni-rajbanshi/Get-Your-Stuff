<!-- Authentication Modal Component -->
<div class="modal" id="authModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="authTitle">Login</h2>
            <button class="close-btn" id="closeAuth">&times;</button>
        </div>
        <div class="modal-body">
            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label for="authName">Full Name *</label>
                    <input type="text" id="authName" required>
                </div>
                <div class="form-group">
                    <label for="authEmail">Email *</label>
                    <input type="email" id="authEmail" required>
                </div>
                <div class="form-group">
                    <label for="authPassword">Password *</label>
                    <input type="password" id="authPassword" required minlength="6">
                </div>
                <div class="form-group" id="roleGroup" style="display: none;">
                    <label for="authRole">Account Type *</label>
                    <select id="authRole" required>
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="authSubmit">Login</button>
                <p class="auth-switch" id="authSwitch">Don't have an account? <a href="#" id="toggleAuth">Sign Up</a></p>
            </form>
        </div>
    </div>
</div>
